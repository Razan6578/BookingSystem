{% extends 'base.html' %}
{% block content %}
<h1>Реєстрація</h1>
<form method="post" action="{% url 'register' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Зареєструватися</button>
</form>
<p>Якщо у вас вже є акаунту, будь ласка, <a href="{% url 'login' %}">увійдіть</a></p>
{% endblock %}
