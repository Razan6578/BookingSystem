{% extends 'base.html' %}
{% block content %}
    <h1>Наші кімнати</h1>
    {% for room in rooms %}
        <img src="{{ room.photo }}" alt="Bright bedroom with a large window">
        <h3>Кімната №{{ room.number }} {{ room.category }}</h3>
        <p>Місць: {{ room.capacity }}</p>
        <p>Ціна: {{ room.price }} грн</p>
        <p><a href="#">Забронювати</a></p>
        <hr>
    {% endfor %}
{% endblock %}
